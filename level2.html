<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arabic For Kids - Level 2 Coming Soon</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; }
        .arabic-text { font-family: 'Noto Kufi Arabic', sans-serif; }
        
        /* Fun Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-float-delayed { animation: float 5s ease-in-out 2s infinite; }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .fade-in-up { animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes rocketBounce {
            0%, 100% { transform: translateY(0) rotate(45deg); }
            50% { transform: translateY(-15px) rotate(45deg); }
        }
        .animate-rocket { animation: rocketBounce 2s infinite; display: inline-block;}
        
        /* Custom Background Pattern */
        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 2px, transparent 2px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen relative overflow-hidden flex items-center justify-center">

    <!-- Decorative Floating Elements (Background) -->
    <div class="absolute top-10 left-10 text-6xl opacity-20 animate-float pointer-events-none">⭐</div>
    <div class="absolute top-32 right-20 text-7xl opacity-20 animate-float-delayed pointer-events-none text-green-400 arabic-text">ج</div>
    <div class="absolute bottom-20 left-20 text-6xl opacity-20 animate-float-delayed pointer-events-none">🧩</div>
    <div class="absolute bottom-32 right-10 text-7xl opacity-20 animate-float pointer-events-none arabic-text text-indigo-400">م</div>
    <div class="absolute top-1/2 left-1/4 text-5xl opacity-20 animate-float pointer-events-none">✨</div>

    <div class="relative z-10 max-w-2xl w-full px-6">
        
        <div class="bg-white p-10 md:p-16 rounded-[3rem] shadow-2xl border-b-[16px] border-green-500 fade-in-up text-center">
            
            <!-- Icon / Emoji -->
            <div class="mb-8">
                <div class="bg-green-50 w-40 h-40 mx-auto rounded-full flex items-center justify-center shadow-inner border-4 border-green-100 relative">
                    <span class="text-7xl animate-rocket">🚀</span>
                    <!-- Little sparkles around the rocket -->
                    <span class="absolute top-2 right-4 text-2xl animate-pulse">✨</span>
                    <span class="absolute bottom-4 left-4 text-2xl animate-pulse" style="animation-delay: 0.5s;">⭐</span>
                </div>
            </div>

            <!-- Typography -->
            <div class="inline-flex items-center gap-2 bg-yellow-100 text-yellow-700 px-5 py-2 rounded-full font-bold text-sm md:text-base mb-6 shadow-sm border border-yellow-200">
                <span class="animate-bounce">🚧</span> Under Construction
            </div>
            
            <h1 class="text-4xl md:text-6xl font-black text-gray-800 mb-6 tracking-tight">
                Level 2 is Launching Soon!
            </h1>
            
            <p class="text-xl md:text-2xl text-gray-500 font-bold mb-12 leading-relaxed">
                We are busy building fun new lessons where letters learn to hold hands and make words! Check back soon.
            </p>

            <!-- Navigation Button -->
            <a href="index.html" class="inline-flex items-center justify-center gap-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-black text-xl px-10 py-5 rounded-full transition-transform hover:-translate-y-1 shadow-md border-2 border-slate-200 w-full sm:w-auto">
                <i data-lucide="arrow-left" class="w-6 h-6"></i> 
                Back to Main Menu
            </a>

        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
