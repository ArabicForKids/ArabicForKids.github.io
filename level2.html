<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arabic For Kids - Level 2 (Reading)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; }
        .arabic-text { font-family: 'Noto Kufi Arabic', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Drag & Drop */
        .draggable { cursor: grab; touch-action: none; z-index: 20; }
        .draggable:active { cursor: grabbing; }
        .dropzone.dragover { transform: scale(1.05); border-color: #10B981; background-color: #F0FDF4; box-shadow: inset 0 2px 4px rgba(0,0,0,0.06); }
        .is-dragging { opacity: 0.5; z-index: 50; pointer-events: none; }
    </style>
</head>
<body class="text-slate-800 h-screen w-full flex flex-col md:flex-row overflow-hidden no-select bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <!-- SIDEBAR -->
    <div class="w-full md:w-80 bg-white shadow-xl z-20 flex flex-col h-[30%] md:h-full flex-shrink-0">
        <div class="p-4 md:p-6 bg-emerald-500 text-white text-center relative flex-shrink-0">
            <a href="index.html" class="absolute top-4 left-4 bg-white/20 p-2 rounded-lg hover:bg-white/40 transition-colors">
                <i data-lucide="home" class="w-5 h-5"></i>
            </a>
            <h1 class="text-xl md:text-2xl font-bold mt-1">Arabic For Kids</h1>
            <p class="opacity-80 text-xs md:text-sm mt-1">Level 2 • Reading Journey</p>
        </div>
        
        <div id="sidebar-list" class="flex-1 overflow-y-auto p-3 flex flex-row md:flex-col gap-2 md:gap-3 items-center md:items-stretch snap-x md:snap-none">
            <!-- Sidebar injected here -->
        </div>
    </div>

    <!-- MAIN AREA -->
    <div class="flex-1 flex flex-col h-[70%] md:h-full overflow-hidden relative">
        <div class="bg-white/90 backdrop-blur-md shadow-sm p-2 md:p-3 sticky top-0 z-10 border-b border-gray-200">
            <div class="max-w-3xl mx-auto flex justify-center gap-2 md:gap-6" id="tabs-container"></div>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 md:p-8 w-full" id="main-scroll-area">
            <div class="max-w-5xl mx-auto" id="content-body"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bg-white border-t p-3 md:p-4 flex justify-between items-center z-10 flex-shrink-0">
            <button id="btn-prev" onclick="prevLesson()" class="flex items-center gap-1 md:gap-2 px-4 py-2 md:px-6 md:py-3 rounded-full font-bold transition-colors text-sm md:text-base bg-gray-100 text-gray-700 hover:bg-gray-200">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                <span class="hidden sm:inline">Previous Lesson</span><span class="sm:hidden">Prev</span>
            </button>
            <button id="btn-next" onclick="nextLesson()" class="flex items-center gap-1 md:gap-2 px-4 py-2 md:px-6 md:py-3 rounded-full font-bold transition-colors text-sm md:text-base bg-emerald-500 text-white hover:bg-emerald-600 shadow-md">
                <span class="hidden sm:inline">Next Lesson</span><span class="sm:hidden">Next</span>
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

<script>
// --- FULL LEVEL 2 CURRICULUM ---
const ALPHABET = ['أ','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','و','ي'];

const LESSONS = [
    {
        id: 1, type: 'review', title: 'Remember Harakat', desc: 'Short vowels check!', color: 'bg-blue-100', accent: 'bg-blue-500', text: 'text-blue-600', border: 'border-blue-500',
        items: [ { char: 'سَ', sound: 'sa' }, { char: 'مِ', sound: 'mi' }, { char: 'رُ', sound: 'ru' }, { char: 'قَ', sound: 'qa' }, { char: 'لِ', sound: 'li' }, { char: 'بُ', sound: 'bu' } ]
    },
    {
        id: 2, type: 'review', title: 'Remember Tanween', desc: 'Double vowels check!', color: 'bg-purple-100', accent: 'bg-purple-500', text: 'text-purple-600', border: 'border-purple-500',
        items: [ { char: 'بً', sound: 'ban' }, { char: 'تٍ', sound: 'tin' }, { char: 'جٌ', sound: 'jun' }, { char: 'دً', sound: 'dan' }, { char: 'طٍ', sound: 'tin' }, { char: 'عٌ', sound: 'un' } ]
    },
    {
        id: 3, type: 'shaddah', title: 'The Shaddah', desc: 'Double Consonants!', color: 'bg-rose-100', accent: 'bg-rose-500', text: 'text-rose-600', border: 'border-rose-500',
        items: [ 
            { parts: ['مْ', 'مَ'], joined: 'مَّ', sound: 'mma' }, 
            { parts: ['بْ', 'بُ'], joined: 'بُّ', sound: 'bbu' }, 
            { parts: ['دْ', 'دِ'], joined: 'دِّ', sound: 'ddi' }, 
            { parts: ['طْ', 'طَ'], joined: 'طَّ', sound: 'tta' } 
        ]
    },
    {
        id: 4, type: 'shapes', title: 'Letter Shapes', desc: 'Beginning, Middle, End!', color: 'bg-pink-100', accent: 'bg-pink-500', text: 'text-pink-600', border: 'border-pink-500',
        items: [
            { base: 'ب', beg: 'بـ', mid: 'ـبـ', end: 'ـب', word: 'بَيْت', parts: ['', 'يْت'], ans: 'بـ' },
            { base: 'ع', beg: 'عـ', mid: 'ـعـ', end: 'ـع', word: 'مَعَ', parts: ['مَـ', ''], ans: 'ـع' },
            { base: 'ج', beg: 'جـ', mid: 'ـجـ', end: 'ـج', word: 'مَسْجِد', parts: ['مَسْـ', 'ـِد'], ans: 'ـجـ' },
            { base: 'د', beg: 'د', mid: 'ـد', end: 'ـد', word: 'دِيْك', parts: ['', 'ِيْك'], ans: 'د' },
            { base: 'ه', beg: 'هـ', mid: 'ـهـ', end: 'ـه', word: 'شَهْر', parts: ['شَـ', 'ـْر'], ans: 'ـهـ' },
            { base: 'ي', beg: 'يـ', mid: 'ـيـ', end: 'ـي', word: 'كُرْسِي', parts: ['كُرْسِـ', ''], ans: 'ـي' },
            { base: 'و', beg: 'و', mid: 'ـو', end: 'ـو', word: 'وَرْدَة', parts: ['', 'َرْدَة'], ans: 'و' }
        ]
    },
    {
        id: 5, type: 'words', title: '2-Letter Words', desc: 'Simple words!', color: 'bg-emerald-100', accent: 'bg-emerald-500', text: 'text-emerald-600', border: 'border-emerald-500',
        words: [
            { split: ['أَ','ب'], joined: 'أَب', eng: 'Father', icon: '🧔‍♂️' },
            { split: ['أُ','م'], joined: 'أُم', eng: 'Mother', icon: '🧕' },
            { split: ['أَ','خ'], joined: 'أَخ', eng: 'Brother', icon: '👦' },
            { split: ['يَ','د'], joined: 'يَد', eng: 'Hand', icon: '✋' },
            { split: ['فَ','م'], joined: 'فَم', eng: 'Mouth', icon: '👄' }
        ]
    },
    {
        id: 6, type: 'words', title: '3-Letter Nouns', desc: 'Things around us!', color: 'bg-orange-100', accent: 'bg-orange-500', text: 'text-orange-600', border: 'border-orange-500',
        words: [
            { split: ['قَ','لَ','م'], joined: 'قَلَم', eng: 'Pen', icon: '🖊️' },
            { split: ['قَ','مَ','ر'], joined: 'قَمَر', eng: 'Moon', icon: '🌙' },
            { split: ['أَ','سَ','د'], joined: 'أَسَد', eng: 'Lion', icon: '🦁' },
            { split: ['بَ','قَ','ر'], joined: 'بَقَر', eng: 'Cow', icon: '🐄' },
            { split: ['و','ل','د'], joined: 'وَلَد', eng: 'Boy', icon: '👦' } 
        ]
    },
    {
        id: 7, type: 'words', title: '3-Letter Actions', desc: 'Doing words!', color: 'bg-red-100', accent: 'bg-red-500', text: 'text-red-600', border: 'border-red-500',
        words: [
            { split: ['ك','ت','ب'], joined: 'كَتَبَ', eng: 'He Wrote', icon: '✍️' },
            { split: ['ق','ر','أ'], joined: 'قَرَأَ', eng: 'He Read', icon: '📖' },
            { split: ['أ','ك','ل'], joined: 'أَكَلَ', eng: 'He Ate', icon: '🍎' },
            { split: ['ج','ل','س'], joined: 'جَلَسَ', eng: 'He Sat', icon: '🪑' },
            { split: ['ش','ر','ب'], joined: 'شَرِبَ', eng: 'He Drank', icon: '💧' }
        ]
    },
    {
        id: 8, type: 'sentences', title: 'Simple Sentences', desc: 'Read full sentences!', color: 'bg-teal-100', accent: 'bg-teal-500', text: 'text-teal-600', border: 'border-teal-500',
        sentences: [
            { words: ['هُوَ', 'أُسْتَاذ'], full: 'هُوَ أُسْتَاذ', icon: '👨‍🏫', eng: 'He is a teacher' },
            { words: ['هَذَا', 'مُحَمَّد'], full: 'هَذَا مُحَمَّد', icon: '👦', eng: 'This is Muhammad' },
            { words: ['الْبُسْتَانُ', 'جَمِيل'], full: 'الْبُسْتَانُ جَمِيل', icon: '🌷🌻', eng: 'The garden is beautiful' },
            { words: ['ذَهَبْتُ', 'إِلَى', 'الْمَسْجِد'], full: 'ذَهَبْتُ إِلَى الْمَسْجِد', icon: '🕌 🚶‍♂️', eng: 'I went to the mosque' }
        ]
    }
];

// --- STATE ---
let currentLessonIdx = 0;
let currentTab = 0; 
let currentAudio = null;

// --- AUDIO LOGIC ---
function playSound(text, btnElement) {
    if(btnElement) {
        btnElement.classList.add('scale-95');
        setTimeout(() => {
            if(document.body.contains(btnElement)) btnElement.classList.remove('scale-95');
        }, 150);
    }
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    window.speechSynthesis.cancel();

    const speakText = () => {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA'; utterance.rate = 0.7; utterance.pitch = 1.2; 
            window.speechSynthesis.speak(utterance);
        }
    };
    try {
        const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=ar&client=tw-ob`;
        currentAudio = new Audio(audioUrl);
        currentAudio.play().catch(() => speakText());
    } catch (e) { speakText(); }
}

function triggerVib() { if (navigator.vibrate) navigator.vibrate([100, 50, 100]); }

// --- RENDER ---
function renderSidebar() {
    const list = document.getElementById('sidebar-list');
    if (!list) return;
    
    list.innerHTML = LESSONS.map((l, idx) => `
        <button onclick="changeLesson(${idx})" class="snap-center flex-none w-56 md:w-auto flex flex-col items-start p-4 rounded-2xl border-2 transition-all ${currentLessonIdx === idx ? `active-lesson ${l.border} ${l.color} shadow-md md:scale-105` : 'border-transparent bg-white hover:bg-gray-50'}">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Unit ${l.id}</span>
            <span class="text-lg font-black text-gray-800">${l.title}</span>
        </button>
    `).join('');
}

function renderTabs() {
    const l = LESSONS[currentLessonIdx];
    const tc = document.getElementById('tabs-container');
    if (!tc) return;

    let tab1Label = 'Build It!';
    let tab1Icon = 'grid';
    if (l.type === 'words') { tab1Label = 'Spell It!'; tab1Icon = 'keyboard'; }
    if (l.type === 'sentences') { tab1Label = 'Train!'; tab1Icon = 'train'; }
    if (l.type === 'review') { tab1Label = 'Listen!'; tab1Icon = 'headphones'; }
    if (l.type === 'shapes') { tab1Label = 'Fix It!'; tab1Icon = 'wrench'; }
    if (l.type === 'shaddah') { tab1Label = 'Merge It!'; tab1Icon = 'combine'; }

    const t = [
        { l: 'Learn', i: 'book-open' },
        { l: tab1Label, i: tab1Icon },
        { l: 'Match It!', i: 'puzzle' }
    ];
    
    tc.innerHTML = t.map((tab, idx) => `
        <button onclick="changeTab(${idx})" class="flex flex-col items-center p-2 md:px-8 md:py-3 rounded-2xl transition-all flex-1 md:flex-none ${currentTab === idx ? `${l.color} ${l.text} shadow-inner font-black` : 'text-gray-500 hover:bg-gray-100 font-bold'}">
            <i data-lucide="${tab.i}" class="w-5 h-5 mb-1"></i><span class="text-xs md:text-sm">${idx + 1}. ${tab.l}</span>
        </button>
    `).join('');
    lucide.createIcons();
}

function renderMainContent() {
    const l = LESSONS[currentLessonIdx];
    const container = document.getElementById('content-body');
    if (!container) return;
    
    let html = '';

    // --- TAB 0: LEARN ---
    if (currentTab === 0) {
        if(l.type === 'review') {
            html = `<div class="animate-fade-in text-center"><h2 class="text-3xl font-black mb-8">${l.title}</h2><div class="grid grid-cols-2 md:grid-cols-3 gap-6">` + 
                l.items.map(i => `<button onclick="playSound('${i.sound}', this)" class="bg-white p-8 rounded-3xl shadow-md border-b-4 border-gray-200 hover:${l.border} transition-all active:scale-95"><span class="text-6xl font-black arabic-text">${i.char}</span></button>`).join('') + `</div></div>`;
        } else if (l.type === 'shaddah') {
            html = `<div class="animate-fade-in text-center"><h2 class="text-3xl font-black mb-8">What is Shaddah?</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-6">` + 
                l.items.map(i => `<button onclick="playSound('${i.sound}', this)" class="bg-white p-6 rounded-3xl shadow-sm border-2 border-gray-100 flex flex-col items-center justify-center hover:scale-105 transition-all"><div class="text-4xl font-bold arabic-text text-gray-400 mb-2" dir="rtl">${i.parts[0]} + ${i.parts[1]} = </div><div class="text-7xl font-black arabic-text text-rose-600">${i.joined}</div></button>`).join('') + `</div></div>`;
        } else if (l.type === 'shapes') {
            html = `<div class="animate-fade-in text-center"><h2 class="text-3xl font-black mb-8">How Letters Join</h2><div class="flex flex-col gap-4">` +
                l.items.map(i => `<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center text-4xl font-bold arabic-text" dir="rtl"><span class="text-gray-400 w-16">${i.base}</span><span class="w-16">${i.beg}</span><span class="w-16">${i.mid}</span><span class="w-16">${i.end}</span></div>`).join('') + `</div></div>`;
        } else if (l.type === 'words') {
            html = `<div class="animate-fade-in text-center"><h2 class="text-3xl font-black mb-8">Read the Words!</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-6">` +
                l.words.map(w => `<button onclick="playSound('${w.joined}', this)" class="bg-white p-6 rounded-3xl shadow-sm border-2 border-gray-100 flex flex-col items-center gap-4 hover:scale-105 transition-all"><span class="text-6xl">${w.icon}</span><span class="text-5xl font-black arabic-text text-indigo-600">${w.joined}</span><span class="text-gray-400 font-bold uppercase">${w.eng}</span></button>`).join('') + `</div></div>`;
        } else if (l.type === 'sentences') {
            html = `<div class="animate-fade-in text-center"><h2 class="text-3xl font-black mb-8">Read Sentences!</h2><div class="flex flex-col gap-6">` +
                l.sentences.map(s => `<button onclick="playSound('${s.full}', this)" class="bg-white p-6 rounded-3xl shadow-sm border-2 border-gray-100 flex items-center justify-between hover:scale-[1.02] transition-all" dir="rtl"><span class="text-6xl">${s.icon}</span><div class="flex flex-col items-start"><span class="text-4xl font-black arabic-text text-indigo-600">${s.full}</span><span class="text-gray-400 font-bold uppercase mt-2">${s.eng}</span></div></button>`).join('') + `</div></div>`;
        }
    } 
    // --- TAB 1: BUILD / SPELL ---
    else if (currentTab === 1) {
        if (l.type === 'review') {
            html = `<div class="text-center animate-fade-in"><h2 class="text-2xl font-black mb-4">Listening Game</h2><p class="mb-8">Click the speaker, then pick the correct card!</p><div class="bg-white p-10 rounded-3xl shadow-lg inline-block mb-8"><button onclick="playTargetSound()" class="bg-indigo-100 text-indigo-600 p-6 rounded-full hover:scale-110 transition-transform"><i data-lucide="volume-2" class="w-12 h-12"></i></button></div><div id="review-options" class="flex justify-center gap-6 flex-wrap"></div></div>`;
        } else if (l.type === 'shaddah') {
            html = `<div class="text-center animate-fade-in w-full max-w-2xl mx-auto"><h2 class="text-2xl font-black mb-8">Merge the Letters!</h2><p class="mb-6 text-gray-500">Drag the double letter to finish the math.</p><div id="shaddah-game-area" class="bg-white p-8 rounded-3xl shadow-xl border-4 border-gray-50 relative overflow-hidden"></div></div>`;
        } else if (l.type === 'shapes') {
            html = `<div class="text-center animate-fade-in w-full max-w-2xl mx-auto"><h2 class="text-2xl font-black mb-8">Shape Shifter!</h2><p class="mb-6 text-gray-500">Drag the correct shape to fix the word.</p><div id="shape-game-area" class="bg-white p-8 rounded-3xl shadow-xl border-4 border-gray-50 relative overflow-hidden"></div></div>`;
        } else if (l.type === 'words') {
            html = `<div class="text-center animate-fade-in"><h2 class="text-2xl font-black mb-2">The Spelling Bee</h2><p class="mb-8 text-gray-500">Drag letters in order to spell the word.</p><div id="spell-game-area" class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-xl border-4 border-gray-50 relative overflow-hidden"></div></div>`;
        } else if (l.type === 'sentences') {
            html = `<div class="text-center animate-fade-in"><h2 class="text-2xl font-black mb-2">Sentence Train</h2><p class="mb-8 text-gray-500">Drag the words in order to match the picture.</p><div id="sentence-game-area" class="bg-white p-8 rounded-[2.5rem] shadow-xl border-4 border-gray-50 relative overflow-hidden"></div></div>`;
        }
    } 
    // --- TAB 2: MATCH ---
    else if (currentTab === 2) {
        html = `<div class="text-center animate-fade-in w-full"><h2 class="text-2xl font-black mb-6">Match Everything!</h2><div id="match-game-area" class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-xl border-4 border-gray-50 relative overflow-hidden"></div></div>`;
    }

    container.innerHTML = html;
    lucide.createIcons();

    // Init specific games
    if (currentTab === 1) {
        if(l.type === 'review') initReviewGame();
        else if(l.type === 'shaddah') initShaddahGame();
        else if(l.type === 'shapes') initShapeGame();
        else if(l.type === 'words') initSpellGame();
        else if(l.type === 'sentences') initSentenceGame();
    } else if (currentTab === 2) {
        initMatchGame();
    }
}

// --- GAME LOGIC: REVIEW (Listen & Find) ---
let currentReviewTarget = null;
function initReviewGame() {
    const reviewOpts = document.getElementById('review-options');
    if (!reviewOpts) return;

    const l = LESSONS[currentLessonIdx];
    currentReviewTarget = l.items[Math.floor(Math.random() * l.items.length)];
    const options = [...l.items].sort(() => Math.random() - 0.5).slice(0, 3);
    if(!options.includes(currentReviewTarget)) options[0] = currentReviewTarget;
    options.sort(() => Math.random() - 0.5);

    reviewOpts.innerHTML = options.map((opt, i) => `
        <button onclick="checkReview('${opt.char}', this)" class="bg-white border-2 border-gray-200 px-8 py-6 rounded-2xl shadow-sm text-5xl font-black arabic-text hover:border-indigo-400 hover:scale-105 transition-all">${opt.char}</button>
    `).join('');
    setTimeout(playTargetSound, 500);
}
window.playTargetSound = () => {
    if (currentReviewTarget) playSound(currentReviewTarget.sound, null);
}
window.checkReview = (char, btn) => {
    if(char === currentReviewTarget.char) {
        playSound('صَحِيح', null);
        btn.classList.replace('border-gray-200', 'border-green-500');
        btn.classList.add('bg-green-50');
        setTimeout(() => {
            if (document.getElementById('review-options')) initReviewGame();
        }, 1500);
    } else {
        triggerVib();
        btn.classList.replace('border-gray-200', 'border-red-500');
        setTimeout(() => {
            if (document.body.contains(btn)) btn.classList.replace('border-red-500', 'border-gray-200');
        }, 500);
    }
}

// --- GAME LOGIC: SHADDAH MERGE ---
let currentShaddahIdx = 0;
function initShaddahGame() {
    const shaddahArea = document.getElementById('shaddah-game-area');
    if (!shaddahArea) return;

    const l = LESSONS[currentLessonIdx];
    const item = l.items[currentShaddahIdx];
    
    let html = `
        <div class="text-4xl md:text-6xl font-black arabic-text text-gray-800 mb-12 flex justify-center items-center gap-4" dir="rtl">
            <span class="text-gray-400">${item.parts[0]} + ${item.parts[1]}</span>
            <span class="text-gray-400">=</span>
            <div class="dropzone w-20 h-24 md:w-24 md:h-28 border-4 border-dashed border-gray-300 rounded-2xl bg-gray-50 flex items-center justify-center" data-ans="${item.joined}"></div>
        </div>
        <div class="flex justify-center gap-6 flex-wrap" id="draggables-container" dir="rtl">
            ${[...l.items].sort(() => Math.random() - 0.5).map((opt, i) => `
                <div class="draggable bg-rose-50 border-2 border-rose-200 w-16 h-16 md:w-20 md:h-20 rounded-xl flex items-center justify-center text-4xl md:text-5xl font-black arabic-text text-rose-600 hover:scale-110 z-20 touch-none" draggable="true" data-val="${opt.joined}">${opt.joined}</div>

// --- UNIVERSAL DRAG & DROP ENGINE ---
function setupDraggables(dropHandler) {
    const draggables = document.querySelectorAll('.draggable');
    const dropzones = document.querySelectorAll('.dropzone');
    let draggedItem = null; let initialTransform = '';

    draggables.forEach(d => {
        d.addEventListener('dragstart', (e) => {
            draggedItem = d;
            setTimeout(() => d.classList.add('is-dragging'), 0);
            e.dataTransfer.setData('text/plain', d.dataset.val);
        });
        d.addEventListener('dragend', () => { d.classList.remove('is-dragging'); draggedItem = null; });
        
        d.addEventListener('touchstart', (e) => {
            draggedItem = d;
            initialTransform = d.style.transform;
            d.style.position = 'absolute'; d.style.zIndex = '100';
            document.body.appendChild(d);
            moveEl(d, e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        d.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (!draggedItem) return;
            const touch = e.touches[0];
            moveEl(draggedItem, touch.clientX, touch.clientY);
            
            dropzones.forEach(z => {
                const r = z.getBoundingClientRect();
                if (touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom) {
                    if(z.dataset.filled !== "true" && !z.classList.contains('draggable-placed')) z.classList.add('dragover');
                } else z.classList.remove('dragover');
            });
        }, {passive: false});

        d.addEventListener('touchend', (e) => {
            if (!draggedItem) return;
            const touch = e.changedTouches[0];
            let dropped = false;

            dropzones.forEach(z => {
                const r = z.getBoundingClientRect();
                if (touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom) {
                    if(z.dataset.filled !== "true" && !z.classList.contains('draggable-placed')) {
                        dropped = dropHandler(z, draggedItem.dataset.val, draggedItem);
                    }
                }
                z.classList.remove('dragover');
            });

            if (!dropped) {
                draggedItem.style.position = 'relative';
                draggedItem.style.left = 'auto'; draggedItem.style.top = 'auto';
                draggedItem.style.transform = initialTransform;
                const container = document.getElementById('draggables-container');
                if(container) container.appendChild(draggedItem);
            }
            draggedItem = null;
        });
    });

    dropzones.forEach(z => {
        z.addEventListener('dragover', (e) => {
            e.preventDefault();
            if(z.dataset.filled !== "true" && !z.classList.contains('draggable-placed')) z.classList.add('dragover');
        });
        z.addEventListener('dragleave', () => z.classList.remove('dragover'));
        z.addEventListener('drop', (e) => {
            e.preventDefault();
            z.classList.remove('dragover');
            const val = e.dataTransfer.getData('text/plain');
            const el = document.querySelector(`.draggable[data-val="${val}"]`);
            if(el) dropHandler(z, val, el);
        });
    });
}
function moveEl(el, x, y) { el.style.left = (x - el.offsetWidth/2) + 'px'; el.style.top = (y - el.offsetHeight/2) + 'px'; }

    }
}

}
